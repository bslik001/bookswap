name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npx prisma validate

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookswap
          POSTGRES_PASSWORD: bookswap
          POSTGRES_DB: bookswap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bookswap -d bookswap_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://bookswap:bookswap@localhost:5432/bookswap_test
      JWT_ACCESS_SECRET: ci_access_secret_1234567890abcdefghijklmnop
      JWT_REFRESH_SECRET: ci_refresh_secret_1234567890abcdefghijklmnop
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      FIREBASE_PROJECT_ID: test
      FIREBASE_PRIVATE_KEY: test
      FIREBASE_CLIENT_EMAIL: test@test.com
      AT_API_KEY: test
      AT_USERNAME: sandbox
      AT_SENDER_ID: BookSwap
      PORT: 3001
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:8081

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm test
