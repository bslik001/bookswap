services:
  postgres:
    image: postgres:16-alpine
    container_name: bookswap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookswap
      POSTGRES_PASSWORD: bookswap
      POSTGRES_DB: bookswap
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bookswap -d bookswap']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
      # Contourne le DNS du daemon Docker (cf. apt-get dans Dockerfile.dev)
      network: host
    container_name: bookswap-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # Override l'URL Postgres pour pointer sur le service compose
      DATABASE_URL: postgresql://bookswap:bookswap@postgres:5432/bookswap
      NODE_ENV: development
      PORT: '3000'
    ports:
      - '3000:3000'
    volumes:
      # Bind-mount du source : hot reload via ts-node-dev
      - ./server:/app
      # Volume anonyme pour ne PAS masquer le node_modules de l'hote
      # (on veut justement reutiliser celui de l'hote, donc pas de "- /app/node_modules")
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
